name: ML Pipeline

on:
  push:
    branches: [main]

env:
  STUDENT_NAME: "RALLAPALLI V S B HARSHITH"
  ROLL_NUMBER: "2022BCS0042"

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          pip install pandas scikit-learn
          pip install dvc[s3]
          pip install awscli

      - name: Print Student Info
        run: |
          echo "Student Name: $STUDENT_NAME"
          echo "Roll Number: $ROLL_NUMBER"

      - name: Configure AWS
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_KEY }}
          aws configure set default.region us-east-1

      - name: Pull dataset from DVC
        run: dvc pull

      - name: Train Model
        run: python src/train.py

      - name: Upload Metrics
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: metrics.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/housing-model:latest
      - name: Write Summary
        run: |
        echo "## ML Pipeline Results - 2022BCS0042" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Dataset Information" >> $GITHUB_STEP_SUMMARY
        echo "- Training Samples: $(jq '.dataset_size' metrics.json)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Model Metrics" >> $GITHUB_STEP_SUMMARY
        echo "- RMSE: $(jq '.rmse' metrics.json)" >> $GITHUB_STEP_SUMMARY
        echo "- R2 Score: $(jq '.r2' metrics.json)" >> $GITHUB_STEP_SUMMARY
    