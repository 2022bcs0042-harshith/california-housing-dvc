name: ML Pipeline

on:
  push:
    branches: [main]

env:
  STUDENT_NAME: "RALLAPALLI V S B HARSHITH"
  ROLL_NUMBER: "2022BCS0042"

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install pandas scikit-learn
          pip install dvc[s3]
          pip install awscli

      - name: Print Student Info
        run: |
          echo "Student Name: $STUDENT_NAME"
          echo "Roll Number: $ROLL_NUMBER"

      - name: Configure AWS Credentials
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_KEY }}
          aws configure set default.region us-east-1

      - name: Pull dataset from DVC
        run: dvc pull

      - name: Train model
        run: python src/train.py

      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: metrics.json

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/housing-model:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/housing-model:latest
